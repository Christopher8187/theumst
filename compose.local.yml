name: theumst-local

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: theumst
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - local_pgdata:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d theumst"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/python/Dockerfile
      target: dev
    environment:
      SERVER: LOCAL
      LOCAL_STORAGE_DIR: /storage
      DB_NAME: theumst
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      SESSION_DAYS: 7
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    volumes:
      - ./backend/python:/app/backend/python
      - ./frontend/assets:/app/frontend/assets:ro
      - local_storage:/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health/db >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20

  webpage:
    build:
      context: .
      dockerfile: frontend/webpage/Dockerfile
      target: dev
    working_dir: /app/frontend/webpage
    command: sh -c "test -d node_modules/vite || npm ci; npm run dev"
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_WEBPAGE_BASE: http://localhost:5173
      VITE_DASHBOARD_BASE: http://localhost:5174/dashboard
      VITE_ASSET_BASE: http://localhost:8000/images
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/webpage:/app/frontend/webpage
      - ./frontend/urls.js:/app/frontend/urls.js:ro
      - ./frontend/assets:/app/frontend/assets:ro
      - webpage_node_modules:/app/frontend/webpage/node_modules
    depends_on:
      backend:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: frontend/dashboard/Dockerfile
      target: dev
    working_dir: /app/frontend/dashboard
    command: sh -c "test -d node_modules/vite || npm ci; npm run dev"
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_WEBPAGE_BASE: http://localhost:5173
      VITE_DASHBOARD_BASE: http://localhost:5174/dashboard
      VITE_ASSET_BASE: http://localhost:8000/images
    ports:
      - "5174:5174"
    volumes:
      - ./frontend/dashboard:/app/frontend/dashboard
      - ./frontend/urls.js:/app/frontend/urls.js:ro
      - ./frontend/assets:/app/frontend/assets:ro
      - dashboard_node_modules:/app/frontend/dashboard/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  local_pgdata:
  local_storage:
  webpage_node_modules:
  dashboard_node_modules:
