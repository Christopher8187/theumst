<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/language.js" defer></script>
  </head>
  <body data-title="about.title">
    <header class="top">
      <div class="brand">
        <a href="/">
          <img class="logo" src="/images/logo.png" data-i18n-alt="alt.logo">
        </a>
        <h1 data-i18n="brand.title"></h1>
      </div>

      <nav class="nav">
        <a href="/" data-i18n="nav.home"></a>
        <a href="/news" data-i18n="nav.news"></a>
        <a href="/about" data-i18n="nav.about"></a>
        <a href="/wiki" data-i18n="nav.wiki"></a>
        <a href="/login" data-i18n="nav.login"></a>
        <a class="get" href="/get" data-i18n="nav.get"></a>

        <div class="language-menu">
          <button class="language-button" type="button" data-language-button>
            <img src="/images/translate.svg" alt="">
            <span data-i18n="language.label"></span>
          </button>

          <div class="language-dropdown" data-language-dropdown>
            <button type="button" data-language-choice="zh" data-i18n="language.zh"></button>
            <button type="button" data-language-choice="en" data-i18n="language.en"></button>
            <button type="button" data-language-choice="ja" data-i18n="language.ja"></button>
          </div>
        </div>
      </nav>

      <h2 class="hero-title" data-i18n="about.title"></h2>
    </header>

    <main class="content about-page">
      <section class="about-intro">
        <h2 data-i18n="about.company.title"></h2>
        <p data-i18n="about.company.text"></p>
      </section>

      <section class="team-section">
        <h2 class="team-title" data-i18n="team.title"></h2>

        <div class="team">
          <article class="member">
            <img src="/images/Chris.jpg" alt="Chris">
            <h3 data-i18n="team.chris.name"></h3>
            <p class="member-role" data-i18n="team.chris.role"></p>

            <div class="member-field">
              <h4 data-i18n="team.field.bio"></h4>
              <p data-i18n="team.chris.bio"></p>
            </div>

            <div class="member-field">
              <h4 data-i18n="team.field.focus"></h4>
              <p data-i18n="team.chris.focus"></p>
            </div>
          </article>

          <article class="member">
            <img src="/images/Randall.jpg" alt="Randall">
            <h3 data-i18n="team.randall.name"></h3>
            <p class="member-role" data-i18n="team.randall.role"></p>

            <div class="member-field">
              <h4 data-i18n="team.field.bio"></h4>
              <p data-i18n="team.randall.bio"></p>
            </div>

            <div class="member-field">
              <h4 data-i18n="team.field.focus"></h4>
              <p data-i18n="team.randall.focus"></p>
            </div>
          </article>

          <article class="member">
            <img src="/images/Penny.jpg" alt="Penny">
            <h3 data-i18n="team.penny.name"></h3>
            <p class="member-role" data-i18n="team.penny.role"></p>

            <div class="member-field">
              <h4 data-i18n="team.field.bio"></h4>
              <p data-i18n="team.penny.bio"></p>
            </div>

            <div class="member-field">
              <h4 data-i18n="team.field.focus"></h4>
              <p data-i18n="team.penny.focus"></p>
            </div>
          </article>

          <article class="member">
            <img src="/images/Kiki.jpg" alt="Kiki">
            <h3 data-i18n="team.kiki.name"></h3>
            <p class="member-role" data-i18n="team.kiki.role"></p>

            <div class="member-field">
              <h4 data-i18n="team.field.bio"></h4>
              <p data-i18n="team.kiki.bio"></p>
            </div>

            <div class="member-field">
              <h4 data-i18n="team.field.focus"></h4>
              <p data-i18n="team.kiki.focus"></p>
            </div>
          </article>

          <article class="member">
            <img src="/images/Tina.jpg" alt="Tina">
            <h3 data-i18n="team.tina.name"></h3>
            <p class="member-role" data-i18n="team.tina.role"></p>

            <div class="member-field">
              <h4 data-i18n="team.field.bio"></h4>
              <p data-i18n="team.tina.bio"></p>
            </div>

            <div class="member-field">
              <h4 data-i18n="team.field.focus"></h4>
              <p data-i18n="team.tina.focus"></p>
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
