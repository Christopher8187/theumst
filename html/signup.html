<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/language.js" defer></script>
  </head>
  <body data-title="signup.title">
    <header class="top login-top">
      <div class="brand">
        <a href="/">
          <img class="logo" src="/images/logo.png" data-i18n-alt="alt.logo">
        </a>
        <h1 data-i18n="brand.title"></h1>
      </div>

      <nav class="nav">
        <a href="/" data-i18n="nav.home"></a>
        <a href="/news" data-i18n="nav.news"></a>
        <a href="/about" data-i18n="nav.about"></a>
        <a href="/wiki" data-i18n="nav.wiki"></a>
        <a href="/login" data-i18n="nav.login"></a>
        <a class="get" href="/get" data-i18n="nav.get"></a>

        <div class="language-menu">
          <button class="language-button" type="button" data-language-button>
            <img src="/images/translate.svg" alt="">
            <span data-i18n="language.label"></span>
          </button>

          <div class="language-dropdown" data-language-dropdown>
            <button type="button" data-language-choice="zh" data-i18n="language.zh"></button>
            <button type="button" data-language-choice="en" data-i18n="language.en"></button>
            <button type="button" data-language-choice="ja" data-i18n="language.ja"></button>
          </div>
        </div>
      </nav>
    </header>

    <main class="login-page">
      <section class="login-shell">
        <div class="login-copy">
          <div class="login-orb"></div>
          <p class="login-kicker" data-i18n="signup.kicker"></p>
          <h2 data-i18n="signup.heading"></h2>
          <p data-i18n="signup.note"></p>
        </div>

        <section class="login-card">
          <div class="login-card-top">
            <img src="/images/logo.png" data-i18n-alt="alt.logo">
            <div>
              <p data-i18n="signup.title"></p>
              <h2 data-i18n="signup.cardHeading"></h2>
            </div>
          </div>

          <form action="/auth/signup" method="post">
            <label>
              <span data-i18n="signup.username"></span>
              <input type="text" name="username" autocomplete="username" required>
            </label>

            <label>
              <span data-i18n="signup.email"></span>
              <input type="email" name="email" autocomplete="email" required>
            </label>

            <label>
              <span data-i18n="signup.password"></span>
              <input type="password" name="password" autocomplete="new-password" required>
            </label>

            <button type="submit" data-i18n="signup.submit"></button>
            <a class="secondary-action" href="/login" data-i18n="signup.login"></a>
          </form>
        </section>
      </section>
    </main>
  </body>
</html>
