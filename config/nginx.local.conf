pid "__PID__";

events {}

http {
    include       "__MIME_TYPES__";
    default_type  application/octet-stream;

    access_log "__ACCESS_LOG__";
    error_log  "__ERROR_LOG__";

    server {
        listen 8080;
        server_name localhost;

        root "__ROOT__";
        index index.html;

        location /auth/ {
            proxy_pass http://127.0.0.1:8000/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /dashboard { return 301 /dashboard/; }

        location /dashboard/ {
            proxy_pass http://127.0.0.1:8000/dashboard/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /index.html { return 301 /; }
        location ~ ^/(news|about|wiki|get|login|signup)\.html$ { return 301 /$1; }

        location ^~ /backend/ { return 404; }
        location ^~ /dev/ { return 404; }
        location ^~ /config/ { return 404; }
        location ~ /\. { return 404; }

        location = / {
            try_files /html/index.html =404;
        }

        location / {
            try_files $uri $uri/ /html$uri.html =404;
        }
    }
}
