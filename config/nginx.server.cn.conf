server {
    listen 80 default_server;
    server_name theumst.cn www.theumst.cn;

    root /var/www/theumst.cn;

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name theumst.cn www.theumst.cn;

    ssl_certificate /etc/letsencrypt/live/theumst-cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/theumst-cn/privkey.pem;

    root /var/www/theumst.cn/frontend/webpage/dist;
    index index.html;

    location /auth/ {
        proxy_pass http://127.0.0.1:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /dashboard/ {
        proxy_pass http://127.0.0.1:8000/dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /images/ {
        alias /var/www/theumst.cn/frontend/public/images/;
    }

    location = /index.html { return 301 /; }
    location ~ ^/(news|about|wiki|get|login|signup)\.html$ { return 301 /$1; }

    location ^~ /backend/ { return 404; }
    location ^~ /dev/ { return 404; }
    location ^~ /config/ { return 404; }
    location ~ /\. { return 404; }

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
