name: theumst-deploy

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-theumst}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - deploy_pgdata:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/python/Dockerfile
      target: production
    environment:
      SERVER: ${SERVER:-LOCAL}
      LOCAL_STORAGE_DIR: /storage
      DB_NAME: ${DB_NAME:-theumst}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      SESSION_DAYS: ${SESSION_DAYS:-7}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-}
      DO_SPACES_ACCESS_KEY_ID: ${DO_SPACES_ACCESS_KEY_ID:-}
      DO_SPACES_SECRET_ACCESS_KEY: ${DO_SPACES_SECRET_ACCESS_KEY:-}
      ALIYUN_OSS_BUCKET: ${ALIYUN_OSS_BUCKET:-}
      ALIYUN_OSS_ENDPOINT: ${ALIYUN_OSS_ENDPOINT:-}
      ALIYUN_OSS_ACCESS_KEY_ID: ${ALIYUN_OSS_ACCESS_KEY_ID:-}
      ALIYUN_OSS_SECRET_ACCESS_KEY: ${ALIYUN_OSS_SECRET_ACCESS_KEY:-${ALIYUN_OSS_ACCESS_KEY_SECRET:-}}
    expose:
      - "8000"
    volumes:
      - deploy_storage:/storage
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./config/nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  deploy_pgdata:
  deploy_storage:
