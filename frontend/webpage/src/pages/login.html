<header class="top login-top">
      <div class="brand">
        <a href="/">
          <img class="logo" src="/images/logo.png" data-i18n-alt="alt.logo">
        </a>
        <h1 data-i18n="brand.title"></h1>
      </div>

      <nav class="nav">
        <a href="/" data-i18n="nav.home"></a>
        <a href="/news" data-i18n="nav.news"></a>
        <a href="/about" data-i18n="nav.about"></a>
        <a href="/wiki" data-i18n="nav.wiki"></a>
        <a href="/login" data-i18n="nav.login"></a>
        <a class="get" href="/get" data-i18n="nav.get"></a>

        <div class="language-menu">
          <button class="language-button" type="button" data-language-button>
            <img src="/images/translate.svg" alt="">
            <span data-i18n="language.label"></span>
          </button>

          <div class="language-dropdown" data-language-dropdown>
            <button type="button" data-language-choice="zh" data-i18n="language.zh"></button>
            <button type="button" data-language-choice="en" data-i18n="language.en"></button>
            <button type="button" data-language-choice="ja" data-i18n="language.ja"></button>
          </div>
        </div>
      </nav>
    </header>

    <main class="login-page">
      <section class="login-shell">
        <div class="login-copy">
          <div class="login-orb"></div>
          <p class="login-kicker" data-i18n="login.kicker"></p>
          <h2 data-i18n="login.heading"></h2>
          <p data-i18n="login.note"></p>
        </div>

        <section class="login-card">
          <div class="login-card-top">
            <img src="/images/logo.png" data-i18n-alt="alt.logo">
            <div>
              <p data-i18n="login.title"></p>
              <h2 data-i18n="login.cardHeading"></h2>
            </div>
          </div>

          <p class="login-error" data-login-error data-i18n="login.badLogin" hidden></p>

          <form action="/auth/login" method="post">
            <label>
              <span data-i18n="login.username"></span>
              <input type="text" name="username" autocomplete="username" required>
            </label>

            <label>
              <span data-i18n="login.password"></span>
              <input type="password" name="password" autocomplete="current-password" required>
            </label>

            <button type="submit" data-i18n="login.submit"></button>
            <a class="secondary-action" href="/signup" data-i18n="login.signup"></a>
          </form>
        </section>
      </section>
    </main>
