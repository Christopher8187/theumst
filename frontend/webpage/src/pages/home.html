<header class="top">
      <div class="brand">
        <a href="/">
          <img class="logo" src="/images/logo.png" data-i18n-alt="alt.logo">
        </a>
        <h1 data-i18n="brand.title"></h1>
      </div>

      <nav class="nav">
        <a href="/" data-i18n="nav.home"></a>
        <a href="/news" data-i18n="nav.news"></a>
        <a href="/about" data-i18n="nav.about"></a>
        <a href="/wiki" data-i18n="nav.wiki"></a>
        <a href="/login" data-nav-login data-i18n="nav.login"></a>
        <a class="get" href="/get" data-i18n="nav.get"></a>

        <div class="language-menu">
          <button class="language-button" type="button" data-language-button>
            <img src="/images/translate.svg" alt="">
            <span data-i18n="language.label"></span>
          </button>

          <div class="language-dropdown" data-language-dropdown>
            <button type="button" data-language-choice="zh" data-i18n="language.zh"></button>
            <button type="button" data-language-choice="en" data-i18n="language.en"></button>
            <button type="button" data-language-choice="ja" data-i18n="language.ja"></button>
          </div>
        </div>
      </nav>

      <section class="home-user-card" data-home-user hidden>
        <img src="/images/Chris.jpg" alt="Profile picture">
        <div class="home-user-name" data-user-username></div>
        <div class="home-user-alias" data-user-alias></div>
        <p data-user-description></p>
        <a href="/dashboard/profile/" data-i18n="dashboard.title"></a>
      </section>

      <h2 class="hero-title" data-i18n="home.title"></h2>
    </header>

    <main class="content">
      <section class="feature">
        <img src="/images/cave.jpg" data-i18n-alt="alt.cave">
        <div class="text">
          <h2 data-i18n="home.explore.title"></h2>
          <p data-i18n="home.explore.text"></p>
        </div>
      </section>

      <section class="feature reverse">
        <div class="text">
          <h2 data-i18n="home.learn.title"></h2>
          <p data-i18n="home.learn.text"></p>
        </div>
        <img src="/images/graph.jpg" data-i18n-alt="alt.graph">
      </section>
    </main>
